{% extends "base.html" %}

{% block title %}Giriş Yap{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto;">
    <h2>Giriş Yap</h2>

    {% if hata %}
        <div style="background:#f8d7da; color:#842029; padding:10px; border-radius:8px; margin-bottom:15px;">
            {{ hata }}
        </div>
    {% endif %}

    <form method="POST" action="/login/">
        {% csrf_token %}

        <div style="margin-bottom: 15px;">
            <label>Kullanıcı Adı:</label>
            <input type="text" name="username" required style="width:100%; padding:10px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label>Şifre:</label>
            <input type="password" name="password" required style="width:100%; padding:10px;">
        </div>

        <button type="submit" class="btn">Giriş Yap</button>
    </form>

    <p style="margin-top:15px;">
        Hesabın yok mu? <a href="/register/">Hesap oluştur</a>
    </p>
</div>
{% endblock %}
