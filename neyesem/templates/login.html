{% extends "base.html" %}

{% block title %}Giriş Yap - Lezzet Rehberi{% endblock %}

{% block content %}

<h2>Giriş Yap</h2>

<form method="POST" action="/login" style="max-width:400px; margin-top:20px;">

    <div class="form-group">
        <label>Kullanıcı Adı:</label>
        <input type="text" name="username" required>
    </div>

    <div class="form-group">
        <label>Şifre:</label>
        <input type="password" name="password" required>
    </div>

    <button type="submit" class="btn">Giriş Yap</button>

</form>

{% endblock %}
