{% extends "base.html" %}

{% block title %}Giriş Yap - Ne Yesem{% endblock %}

{% block content %}
<div style="background: white; max-width: 400px; margin: 50px auto; padding: 40px; border-radius: 16px; box-shadow: var(--shadow-sm); border: 1px solid #edf2f7; text-align: center;">
    <div style="margin-bottom: 30px;">
        <div style="width: 60px; height: 60px; background: #fff0eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px auto; color: var(--primary);">
            <i class="fa-solid fa-arrow-right-to-bracket" style="font-size: 24px;"></i>
        </div>
        <h2 style="font-size: 24px; font-weight: 800; color: var(--text-main);">Tekrar Hoş Geldiniz</h2>
        <p style="font-size: 14px; color: var(--text-muted); margin-top: 5px;">Mutfaktaki serüveninize devam edin.</p>
    </div>

    {% if hata %}
        <div style="background:#fef2f2; color:#ef4444; border: 1px solid #fca5a5; padding:12px; border-radius:8px; margin-bottom:20px; font-size:14px; font-weight:500;">
            <i class="fa-solid fa-circle-exclamation" style="margin-right:5px;"></i> {{ hata }}
        </div>
    {% endif %}

    <form method="POST" action="/login/" style="text-align: left;">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom:8px; font-size:13px; font-weight:600; color:var(--text-muted);">Kullanıcı Adı</label>
            <input type="text" name="username" placeholder="Örn: ahmet_chef" required>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom:8px; font-size:13px; font-weight:600; color:var(--text-muted);">Şifre</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn" style="width: 100%; display: flex; justify-content: center; align-items: center; font-size: 15px;">Giriş Yap <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i></button>
    </form>

    <div style="margin-top:25px; border-top: 1px solid #edf2f7; padding-top: 20px;">
        <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 10px;">
            Hesabınız yok mu? <a href="/register/" style="color: var(--primary); font-weight: 600; text-decoration: none;">Ücretsiz Kayıt Ol</a>
        </p>
        <p style="font-size: 13px;">
            <a href="/password-reset/" style="color: #718096; font-weight: 500; text-decoration: none;"><i class="fa-solid fa-lock" style="margin-right: 4px;"></i> Şifremi Unuttum</a>
        </p>
    </div>
</div>
{% endblock %}
