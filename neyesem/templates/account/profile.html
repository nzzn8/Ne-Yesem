{% extends "account_base.html" %}

{% block account_content %}
<h2 style="font-size: 24px; font-weight: 700; margin-bottom: 25px; color: var(--text-main); border-bottom: 2px solid #f8fafc; padding-bottom: 15px;">Profil Bilgileri</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px;">
        <div>
            <label style="display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--text-muted);">Ad</label>
            {{ u_form.first_name }}
        </div>
        <div>
            <label style="display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--text-muted);">Soyad</label>
            {{ u_form.last_name }}
        </div>
    </div>
    
    <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--text-muted);">E-posta Adresi</label>
        {{ u_form.email }}
    </div>

    <div style="margin-bottom: 25px; background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px dashed #cbd5e1;">
        <label style="display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--text-muted);">Profil Fotoğrafı Düzenle</label>
        {{ p_form.avatar }}
    </div>

    <div style="margin-bottom: 30px; display: flex; align-items: center; gap: 10px;">
        {{ p_form.newsletter }}
        <label style="font-size: 14px; color: var(--text-main); font-weight: 500;">Özel tarifler ve öneriler için e-posta almak istiyorum.</label>
    </div>

    <button type="submit" class="btn"><i class="fa-solid fa-floppy-disk" style="margin-right:8px;"></i> Değişiklikleri Kaydet</button>
</form>
{% endblock %}
