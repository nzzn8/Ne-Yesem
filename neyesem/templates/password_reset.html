{% extends "base.html" %}

{% block title %}Şifremi Unuttum - Ne Yesem{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    <h2 style="color: #ff6b35; margin-bottom: 20px; text-align: center;">Şifremi Unuttum 🔑</h2>
    <p style="margin-bottom: 20px; font-size: 14px; color: #555; text-align: center;">
        Kayıtlı e-posta adresinizi girin, size güvenli bir şifre sıfırlama bağlantısı gönderelim.
    </p>

    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom:5px; font-weight:500;">E-posta Adresiniz</label>
            {{ form.email }}
        </div>
        <button type="submit" class="btn" style="width: 100%;">Bağlantı Gönder</button>
    </form>
</div>
{% endblock %}
