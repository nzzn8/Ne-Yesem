<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Ne yesem{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
        }

        /* Navbar */
        nav {
            background-color: #ff6b35;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 {
            color: white;
            font-size: 24px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: 0.3s;
        }

        nav ul li a:hover {
            opacity: 0.8;
        }

        /* Container */
        .container {
            width: 85%;
            margin: 40px auto;
        }

        /* Footer */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            background-color: #ff6b35;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #e85a2a;
        }

        /* Cards */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin-bottom: 10px;
            color: #ff6b35;
        }

        .card p {
            font-size: 14px;
            margin-bottom: 15px;
        }

        /* Form */
        .form-group {
            margin-bottom: 15px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        @media(max-width: 768px) {
            nav {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<nav style="display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:#ff6b35; color:white;">

    <div style="font-size:22px; font-weight:bold;">
        Ne Yesem
    </div>

    <div style="display:flex; align-items:center; gap:25px;">
        <a href="/" style="color:white; text-decoration:none;">Ana Sayfa</a>
        <a href="/tarifler" style="color:white; text-decoration:none;">Tarifler</a>
        <a href="/iletisim/" style="color:white; text-decoration:none;">İletişim</a>

        {% if user.is_authenticated %}
        <div class="dropdown" style="position:relative;">
            <div onclick="toggleMenu()" style="cursor:pointer; font-size:22px;">
                👤
            </div>

            <div id="profileMenu" style="
                display:none;
                position:absolute;
                right:0;
                top:35px;
                background:white;
                color:black;
                border-radius:8px;
                box-shadow:0 4px 10px rgba(0,0,0,0.2);
                min-width:150px;
                overflow:hidden;
            ">

                <a href="/account/" style="display:block; padding:12px; text-decoration:none; color:black;">
                    Hesabım
                </a>

                <a href="/logout/" style="display:block; padding:12px; text-decoration:none; color:black;">
                    Çıkış Yap
                </a>

            </div>
        </div>
        {% endif %}
    </div>

</nav>

<script>
function toggleMenu() {
    var menu = document.getElementById("profileMenu");

    if (menu.style.display === "block") {
        menu.style.display = "none";
    } else {
        menu.style.display = "block";
    }
}
</script>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<footer>
    © 2026 Ne Yesem | Tüm Hakları Saklıdır
</footer>

</body>
</html>
